# RocketMQ Broker 配置(本地开发)
brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0

deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH

# 关键:对外广播宿主机可达的地址。
# 因为应用跑在宿主机,通过映射端口连 broker,这里必须是 127.0.0.1,
# 否则 NameServer 会返回容器内网 IP,宿主机的客户端连不上。
brokerIP1 = 127.0.0.1

# 开发期允许自动创建 Topic / 订阅组,省去手动建 Topic
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true

# NameServer 地址(也可由启动命令 -n 传入)
namesrvAddr = rmq-namesrv:9876
