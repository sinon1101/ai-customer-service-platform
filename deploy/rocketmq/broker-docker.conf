# RocketMQ Broker 配置(全容器化部署:后端也在 compose 网络内)
brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0

deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH

# 关键:后端容器与 broker 在同一 compose 网络,这里广播服务名 rmq-broker,
# NameServer 返回它,后端容器经 docker DNS 解析即可连上(与本机开发用 127.0.0.1 相区别)。
brokerIP1 = rmq-broker

# 允许自动创建 Topic / 订阅组,省去手动建 Topic
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true

# NameServer 地址(也可由启动命令 -n 传入)
namesrvAddr = rmq-namesrv:9876
