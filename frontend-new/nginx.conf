# 前端容器:托管 Vite 构建产物 + 把 /api、/ws 反代到后端(对齐 dev 阶段的 Vite proxy)。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # REST API:剥掉 /api 前缀转给后端(/api/auth/login → backend:8081/auth/login)
    # 同时关闭缓冲、用 HTTP/1.1、放长超时,以支撑 /chat/stream 的 SSE 流式问答
    location /api/ {
        proxy_pass http://backend:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # WebSocket 实时会话:保留 /ws 路径 + 升级头(/ws/chat?ticketId=&token=)
    location /ws/ {
        proxy_pass http://backend:8081/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA 前端路由回退(history 模式)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
