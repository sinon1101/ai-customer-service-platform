server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3308/ai_customer_service?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8
    username: root
    password: "123456"
  data:
    redis:
      host: localhost
      port: 6381
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  ai:
    dashscope:
      # API Key:容器内用 DASHSCOPE_API_KEY(deploy/.env),本机开发回退到系统环境变量 API-KEY
      api-key: ${DASHSCOPE_API_KEY:${API-KEY:}}
      chat:
        options:
          # 模型名,后续可在此切换(qwen-plus / qwen-turbo / qwen-max ...)
          model: qwen-plus
      embedding:
        options:
          # 文本向量模型(默认 1024 维),RedisVectorStore 自动据此建索引
          model: text-embedding-v3
# RocketMQ 原生客户端连接(producer/consumer 手写 bean,见 RocketMQConfig / DocIngestConsumer)
rocketmq:
  name-server: 127.0.0.1:9876
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug